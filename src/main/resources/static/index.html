<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manpro CRM</title>
    <style>
        body {
            margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #15795f, #0f5e49); color: #0f172a;
        }
        .card {
            background: #fff; border-radius: 18px; padding: 44px 48px; max-width: 460px; text-align: center;
            box-shadow: 0 30px 60px -25px rgba(0,0,0,.45);
        }
        .logo { font-size: 46px; }
        h1 { margin: 12px 0 6px; font-size: 26px; }
        .tag { margin: 0 0 4px; color: #15795f; font-weight: 700; font-size: 14px; }
        p { margin: 0; color: #64748b; font-size: 15px; }
        .ok { margin-top: 22px; display: inline-block; background: #dcfce7; color: #15803d;
              font-weight: 700; font-size: 13px; padding: 7px 16px; border-radius: 999px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🔧</div>
        <h1>Welcome to Manpro</h1>
        <p class="tag">Maintenance done right.</p>
        <p>Your Business Command Center — built one module at a time.</p>
        <span class="ok">✓ It works! Your app is running on the web.</span>
    </div>
</body>
</html>
